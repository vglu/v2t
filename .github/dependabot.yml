version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
