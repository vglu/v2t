# Build installers and attach to a GitHub Release when you push a version tag.
# Bump version in package.json, src-tauri/Cargo.toml, and src-tauri/tauri.conf.json first,
# then: git tag v1.0.0 && git push origin v1.0.0
# See docs/RELEASE.md for the full checklist.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Linux dependencies for Tauri
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: Apple code signing & notarization (add repo secrets when ready)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Video to Text ${{ github.ref_name }}
          releaseBody: |
            **Video to Text (v2t)** — video / audio / URLs → text via ffmpeg, yt-dlp, and either an OpenAI-compatible HTTP API or local whisper.cpp.

            | OS | Assets |
            |----|--------|
            | **Windows** | NSIS setup `.exe`, MSI `.msi` (x64) |
            | **macOS** | DMG per arch: **aarch64** = Apple Silicon, **x86_64** = Intel |
            | **Linux** | `.deb` and AppImage (built on Ubuntu 22.04; install WebKitGTK deps per distro if the app fails to start) |

            Close the running app before reinstalling on Windows. Optional: put `ffmpeg` / `yt-dlp` next to the executable or use in-app download (Windows/macOS).

            ---
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
